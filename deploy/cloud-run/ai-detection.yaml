apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-detection
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle (model loading takes ~10s on cold start)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: scr-mesh-sa@PROJECT_ID.iam.gserviceaccount.com
      # Timeout extended for image processing workloads
      timeoutSeconds: 120
      containers:
        - image: gcr.io/PROJECT_ID/ai-detection:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: INFO
          resources:
            limits:
              # Needs more CPU/RAM for CV inference
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 15
            periodSeconds: 30
